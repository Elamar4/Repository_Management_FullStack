<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — Kapital A.S. MMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <img src="img/kapital-logo.png" alt="Kapital A.S. MMC" class="login-logo" />
    <h1>İcarə İdarəetmə Sistemi</h1>
    <p class="sub">İstifadəçi adı və şifrə ilə daxil olun</p>

    <form class="login-form" id="loginForm">
      <div class="form-group full">
        <label for="username">İstifadəçi adı</label>
        <input type="text" id="username" autocomplete="username" placeholder="məs. Kamran" />
      </div>
      <div class="form-group full">
        <label for="password">Şifrə</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <div id="loginError" class="login-error hidden"></div>

      <button type="submit" class="primary-btn login-btn">Daxil ol</button>
    </form>

    <div class="login-hint">
      <strong>Demo hesablar:</strong>
      <span>elmar / admin123 (Admin)</span>
      <span>rashad / manager123 (Menecer)</span>
      <span>nigar / user123 (İşçi)</span>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
