<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müştərilər — Kapital A.S. MMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/customers.css" />
</head>
<body data-page="customers" data-title="Müştərilər" data-subtitle="Müştəri siyahısı, borc və depozit">
  <div id="appLoader"><div class="loader-spinner"></div></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app">
    <div data-shell-sidebar></div>
    <main class="main">
      <div data-shell-header></div>
      <section class="content">
        <div class="section-card">
          <div class="section-header">
            <div>
              <h2>Müştərilər</h2>
              <p>Ad, telefon və ya ünvana görə axtar</p>
            </div>
            <div class="toolbar-row">
              <input type="text" id="custSearch" class="toolbar-input search-toolbar-input" placeholder="Müştəri axtar" />
              <button class="primary-btn" id="addCustBtn" data-perm="create" type="button">+ Müştəri əlavə et</button>
            </div>
          </div>
          <div id="custList" class="customer-list-clean" style="padding:18px 20px"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/ui-enhance.js"></script>
  <script src="js/customers.js"></script>
</body>
</html>
