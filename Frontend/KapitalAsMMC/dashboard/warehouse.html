<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anbar — Kapital A.S. MMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/warehouse.css" />
</head>
<body data-page="warehouse" data-title="Anbar" data-subtitle="Məhsullar, stok və icarə vəziyyəti">
  <div id="appLoader"><div class="loader-spinner"></div></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app">
    <div data-shell-sidebar></div>
    <main class="main">
      <div data-shell-header></div>
      <section class="content">
        <div id="zeroWarn"></div>
        <div class="section-card">
          <div class="section-header">
            <div>
              <h2>Anbar məhsulları</h2>
              <p>Sıfır stok qaimə yaratmağı <strong>bloklamır</strong> — yalnız xəbərdarlıq</p>
            </div>
            <div class="toolbar-row">
              <input type="text" id="whSearch" class="toolbar-input search-toolbar-input" placeholder="Məhsul axtar" />
              <button class="primary-btn" id="addProdBtn" data-perm="create" type="button">+ Məhsul əlavə et</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Məhsul</th>
                  <th>Kateqoriya</th>
                  <th>Anbarda</th>
                  <th>İcarədə</th>
                  <th>Minimum</th>
                  <th>Qiymət</th>
                  <th>Vəziyyət</th>
                  <th>Əməliyyat</th>
                </tr>
              </thead>
              <tbody id="whTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/ui-enhance.js"></script>
  <script src="js/warehouse.js"></script>
</body>
</html>
