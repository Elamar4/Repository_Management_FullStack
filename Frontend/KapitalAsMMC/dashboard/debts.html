<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borclar — Kapital A.S. MMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/debts.css" />
</head>
<body data-page="debts" data-title="Borclar" data-subtitle="Yalnız borcu olan müştərilər">
  <div id="appLoader"><div class="loader-spinner"></div></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app">
    <div data-shell-sidebar></div>
    <main class="main">
      <div data-shell-header></div>
      <section class="content">
        <div class="kpi-row" id="debtKpi"></div>
        <div class="section-card">
          <div class="section-header">
            <div>
              <h2>Borclu müştərilər</h2>
              <p>Yalnız borcu <strong>0-dan böyük</strong> olanlar görünür</p>
            </div>
            <div class="toolbar-row">
              <input type="text" id="debtSearch" class="toolbar-input search-toolbar-input" placeholder="Müştəri axtar" />
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Müştəri</th>
                  <th>Telefon</th>
                  <th>Gecikən qaimə</th>
                  <th>Ümumi borc</th>
                  <th>Əməliyyat</th>
                </tr>
              </thead>
              <tbody id="debtTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/ui-enhance.js"></script>
  <script src="js/debts.js"></script>
</body>
</html>
